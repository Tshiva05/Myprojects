<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
 
  <link rel='stylesheet' href="style.css"
 
</head>

<body>
  <div id='head'><h3>Shiva's Calculator </h3></div>
  

<div class='calsi_container'>
  
  
<input id='input' type='text' placeholder='0'>
<div>
  
  <button id='clear'>Ac</button>
  <button  id='Delete'>De</button>
  <button onclick="appendvalue('%')"id='module'>%</button>
  <button onclick="appendvalue('/')" id='div'>/</button>
  
</div>

<div>
  
  <button onclick="appendvalue('7')">7</button>
  <button onclick="appendvalue('8')">8</button>
  <button onclick="appendvalue('9')">9</button>
  <button onclick="appendvalue('*')" id='multy'>*</button>
  
</div>


<div>
  
  <button onclick="appendvalue('4')">4</button>
  <button onclick="appendvalue('5')">5</button>
  <button onclick="appendvalue('6')">6</button>
  <button onclick="appendvalue('-')"id='oparaters'>-</button>
  
</div>

<div>
  
  <button onclick="appendvalue('1')">1</button>
  <button onclick="appendvalue('2')">2</button>
  <button onclick="appendvalue('3')">3</button>
  <button onclick="appendvalue('+')" id='oparaters'>+</button>
  
</div>

<div>
  
  <button onclick="appendvalue('00')">00</button>
  <button onclick="appendvalue('0')">0</button>
  <button onclick="appendvalue('.')" id='oparaters'>.</button>
  <button id='equal'>=</button>
  
  
</div>

</div>

</body>

<script src="script.js">
  
</script>

</html>
